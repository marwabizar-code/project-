<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>واجبك | منصة تسليم الواجبات</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #eef2ff, #f8fafc);
      color: #1f2933;
    }

    header {
      padding: 30px;
      text-align: center;
    }

    header h1 {
      font-size: 36px;
      color: #1d4ed8;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      color: #475569;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card h3 {
      color: #1d4ed8;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 15px;
      color: #475569;
    }

    .cta {
      text-align: center;
      margin: 50px 0;
    }

    .cta a {
      background: #1d4ed8;
      color: white;
      padding: 15px 35px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
      transition: 0.3s;
    }

    .cta a:hover {
      background: #1e40af;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  <h1>واجبك</h1>
  <p>منصة بسيطة لتسليم الواجبات بين المعلم والطالب</p>
</header>

<div class="container">

  <div class="features">
    <div class="card">
      <h3>📚 للمعلمين</h3>
      <p>أنشئ واجباتك، تابع تسليم الطلاب، واستقبل الملفات بسهولة.</p>
    </div>

    <div class="card">
      <h3>🎓 للطلاب</h3>
      <p>سلّم واجباتك بصيغة صورة، PDF أو مستند بكل سهولة.</p>
    </div>

    <div class="card">
      <h3>☁️ سحابي</h3>
      <p>كل شيء محفوظ آمنًا، ويمكن الدخول من أي جهاز.</p>
    </div>
  </div>

  <div class="cta">
    <a href="login.html">ابدأ الآن</a>
  </div>

</div>

<footer>
  © 2026 واجبك – جميع الحقوق محفوظة | Marwa Bizar
</footer>

</body>
</html>
