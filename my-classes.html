<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>واجبك | مجموعاتي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
    }

    header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.06);
      margin-bottom: 15px;
      cursor: pointer;
    }

    .card h3 {
      margin: 0;
      color: #1d4ed8;
    }

    .card p {
      margin: 5px 0 0;
      color: #475569;
      font-size: 14px;
    }

    .back {
      margin-top: 20px;
      text-align: center;
    }

    .back button {
      padding: 12px 25px;
      border-radius: 14px;
      border: none;
      background: #e0e7ff;
      color: #1d4ed8;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  مجموعاتي
</header>

<div class="container" id="classes">
  <!-- المجموعات تظهر هنا -->
</div>

<div class="back">
  <button onclick="back()">⬅ الرجوع</button>
</div>

<script src="firebase.js"></script>

<script>
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    loadClasses(user.uid);
  });

  function loadClasses(teacherId) {
    db.collection("classes")
      .where("teacherId", "==", teacherId)
      .orderBy("createdAt", "desc")
      .get()
      .then(snapshot => {
        const container = document.getElementById("classes");
        container.innerHTML = "";

        if (snapshot.empty) {
          container.innerHTML = "<p>لا توجد مجموعات بعد</p>";
          return;
        }

        snapshot.forEach(doc => {
          const data = doc.data();
          const div = document.createElement("div");
          div.className = "card";
          div.innerHTML = `
            <h3>${data.name}</h3>
            <p>كود المجموعة: ${data.code}</p>
          `;
          div.onclick = () => {
            localStorage.setItem("currentClassId", doc.id);
            window.location.href = "class-dashboard.html";
          };
          container.appendChild(div);
        });
      });
  }

  function back() {
    window.location.href = "teacher-dashboard.html";
  }
</script>

</body>
</html>
