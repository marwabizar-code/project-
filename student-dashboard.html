<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>واجبك | لوحة الطالب</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
    }

    header {
      background: #16a34a;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 18px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #cbd5f5;
      margin-top: 10px;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      background: #16a34a;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    .class-card {
      background: #ecfdf5;
      padding: 15px;
      border-radius: 14px;
      margin-bottom: 10px;
      cursor: pointer;
    }

    .class-card h4 {
      margin: 0;
      color: #166534;
    }
  </style>
</head>

<body>

<header>
  لوحة الطالب
</header>

<div class="container">

  <!-- إدخال كود المجموعة -->
  <div class="box">
    <h3>الانضمام إلى مجموعة</h3>
    <input type="text" id="classCode" placeholder="أدخل كود المجموعة">
    <button onclick="joinClass()">انضمام</button>
