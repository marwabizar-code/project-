      <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>واجبك | لوحة المعلم</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
    }

    header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 500px;
      margin: 50px auto;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #1d4ed8;
      color: white;
    }

    .secondary {
      background: #e0e7ff;
      color: #1d4ed8;
    }

    .danger {
      background: #fee2e2;
      color: #b91c1c;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>

<body>

<header>
  لوحة المعلم – واجبك
</header>

<div class="container">
  <div class="box">
    <button class="primary" onclick="goCreate()">➕ إنشاء مجموعة جديدة</button>
    <button class="secondary" onclick="goSelect()">📂 اختيار مجموعة موجودة</button>
    <button class="danger" onclick="logout()">🚪 تسجيل الخروج</button>
  </div>
</div>

<footer>
  © 2026 واجبك – جميع الحقوق محفوظة | Marwa Bizar
</footer>

<script src="firebase.js"></script>

<script>
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  function goCreate() {
    window.location.href = "create-class.html";
  }

  function goSelect() {
    window.location.href = "my-classes.html";
  }

  function logout() {
    auth.signOut().then(() => {
      window.location.href = "login.html";
    });
  }
</script>

</body>
</html>
