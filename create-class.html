<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>واجبك | إنشاء مجموعة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background: #f8fafc;
    }

    header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 2px solid #e5e7eb;
      margin-bottom: 15px;
      font-family: 'Cairo', sans-serif;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #1d4ed8;
      color: white;
    }

    .secondary {
      background: #e0e7ff;
      color: #1d4ed8;
      margin-top: 10px;
    }

    .code {
      margin-top: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      color: #1d4ed8;
    }
  </style>
</head>

<body>

<header>
  إنشاء مجموعة جديدة
</header>

<div class="container">
  <div class="box">
    <input type="text" id="className" placeholder="اسم المجموعة (مثال: ثالث A)">
    <button class="primary" onclick="createClass()">إنشاء المجموعة</button>

    <div id="result" class="code"></div>

    <button class="secondary" onclick="back()">⬅ الرجوع</button>
  </div>
</div>

<script src="firebase.js"></script>

<script>
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.href = "login.html";
    }
  });

  function generateCode() {
    return Math.random().toString(36).substring(2, 8).toUpperCase();
  }

  function createClass() {
    const name = document.getElementById("className").value;
    if (!name) {
      alert("اكتبي اسم المجموعة");
      return;
    }

    const code = generateCode();

    db.collection("classes").add({
      name: name,
      code: code,
      teacherId: auth.currentUser.uid,
      createdAt: new Date()
    }).then(() => {
      document.getElementById("result").innerText =
        "تم إنشاء المجموعة 🎉\nكود المجموعة: " + code;

      document.getElementById("className").value = "";
    });
  }

  function back() {
    window.location.href = "teacher-dashboard.html";
  }
</script>

</body>
</html>
